services:
  db:
    container_name: DR01TEST
    image: postgres
    environment:
      - POSTGRES_USER=davraf
      - POSTGRES_PASSWORD=Gundam00
      - PGDATA=/data/postgres
    volumes:
      - db:/data/postgres
    ports:
      - "5432:5432"
    networks:
      - db
    restart: unless-stopped
    command: /bin/bash -c "until pg_isready -U davraf -p 5432; do sleep 1; done; psql -U Gundam00 -c 'CREATE DATABASE drnutrizionino;'"
  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: d.raffagli@gmail.com
      PGADMIN_DEFAULT_PASSWORD: Gundam00
      PGADMIN_LISTEN_PORT: 80
    ports:
      - 15432:80
    volumes:
      - pgadmin:/var/lib/pgadmin
    depends_on:
      - db    
networks:
  db:
    driver: bridge
  pgadmin:
    driver: bridge
volumes:
  db:
  pgadmin:
